name: doodleduet

services:
  redis:
    image: redis:7-alpine
    container_name: doodleduet-redis
    volumes:
      - doodleduet-data:/data
    command: "redis-server --appendonly yes --dir /data"
    restart: unless-stopped
    networks:
      - doodleduet

  doodleduet-app:
    image: ghcr.io/joshevans-weber/doodleduet-app:v1.0.0
    container_name: doodleduet-app
    ports:
      - 9002:9002
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:9002
    volumes:
      - doodleduet-data:/app/data
    restart: unless-stopped
    networks:
      - doodleduet

networks:
  doodleduet:
    driver: bridge

volumes:
  doodleduet-data:
    driver: local

x-casaos:
  architectures: ["amd64"]
  main: doodleduet-app
  title:
    en_us: DoodleDuet
  icon: https://raw.githubusercontent.com/JoshEvans-Weber/casaos-store/main/Apps/doodleduet-app/icon.png
  author: aiyuayaan & Contributors
  category: Games
  version: 1.0.1
  tagline:
    en_us: Real-time collaborative drawing application with live chat
  description:
    en_us: "DoodleDuet is a real-time collaborative drawing application built with Next.js 15, Socket.IO, and Redis. Draw together with friends on an infinite canvas with pan, zoom, and color controls. Features include live text chat, multiple brush sizes, room management, and admin controls."
  web_ui: http://localhost:9002
  ports:
    - target: 9002
      published: 9002
      protocol: tcp
  schemes: []
