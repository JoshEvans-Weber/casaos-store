version: '3.8'

services:
  wyze-bridge:
    container_name: casaos-wyze-bridge
    image: ghcr.io/joshevans-weber/wyze-bridge:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "5000:5000"    # Web UI
      - "8554:8554"    # RTSP
      - "8888:8888"    # Main service
      - "8189:8189/udp" # WebRTC/ICE
      - "8889:8889"    # WebRTC
    environment:
      - WB_AUTH=true
      - WB_PASSWORD=${WB_PASSWORD:-wyzebridge}
      - WB_IP=${WB_IP:-}
      - RECORD_ALL=${RECORD_ALL:-}
      - RECORD_PATH=${RECORD_PATH:-/media/bridge/recordings}
    volumes:
      - /DATA/AppData/wyze-bridge:/media/bridge
    stdin_open: false
    tty: false
